<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kiwibit | Restricted Access Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffffff",
                        "background-dark": "#000000",
                        "terminal-gray": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["monospace"]
                    },
                    letterSpacing: {
                        "ultra": "0.5em",
                        "technical": "0.2em",
                        "tightest": "-0.04em"
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background-dark text-white font-display selection:bg-white selection:text-black overflow-hidden;
            }
        }
        .technical-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.03);
        }
        .input-technical {
            @apply bg-transparent border-white/10 text-white placeholder:text-white/10 text-sm tracking-wide focus:ring-0 focus:border-white transition-all duration-500;
        }
        .wireframe-bg {
            background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100px 100px;
        }
        .micro-label {
            font-size: 8px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.4;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">
<div class="absolute inset-0 wireframe-bg pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] pointer-events-none">
<svg class="w-full h-full opacity-[0.03]" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<path d="M100 0 L200 100 L100 200 L0 100 Z" fill="none" stroke="white" stroke-width="0.5"></path>
<circle cx="100" cy="100" fill="none" r="70" stroke="white" stroke-dasharray="2 2" stroke-width="0.2"></circle>
<rect fill="none" height="100" stroke="white" stroke-width="0.3" width="100" x="50" y="50"></rect>
</svg>
</div>
<div class="absolute top-10 left-10 opacity-20 font-mono text-[8px] tracking-technical">
        COORD: 51.5074° N, 0.1278° W<br/>
        NODE: GB_LON_SEC_01
    </div>
<div class="absolute bottom-10 right-10 opacity-20 font-mono text-[8px] tracking-technical text-right">
        TERMINAL_ID: KWB_882_X<br/>
        ENCRYPTION: AES_256_GCM
    </div>
<div class="relative z-10 w-full max-w-[450px] p-12 technical-border bg-black/60 backdrop-blur-3xl">
<div class="flex flex-col items-center">
<div class="mb-12 flex flex-col items-center">
<span class="material-symbols-outlined text-white text-4xl font-extralight mb-4">security</span>
<h1 class="text-xs font-black tracking-ultra uppercase text-white/90">Kiwibit</h1>
</div>
<div class="text-center mb-10">
<h2 class="text-xl font-bold tracking-[0.3em] uppercase mb-3">Restricted Access</h2>
<p class="font-mono text-[9px] tracking-widest text-white/30">
                    AUTHENTICATION_REQUIRED // SECURE_SHELL_ACTIVE
                </p>
</div>
<form class="w-full space-y-8">
<div class="space-y-1">
<label class="micro-label ml-1">Operator_Identity</label>
<input class="w-full h-12 input-technical" placeholder="EMAIL_ADDRESS" type="email"/>
</div>
<div class="space-y-1">
<label class="micro-label ml-1">Access_Key</label>
<input class="w-full h-12 input-technical" placeholder="••••••••" type="password"/>
</div>
<div class="pt-4">
<button class="w-full bg-white text-black h-14 text-[11px] font-black uppercase tracking-ultra hover:bg-neutral-200 transition-colors" type="submit">
                        Authorize Access
                    </button>
</div>
</form>
<div class="mt-10 w-full flex flex-col items-center gap-6">
<a class="text-[10px] font-bold uppercase tracking-widest text-white/20 hover:text-white transition-colors" href="#">
                    Forgot Credentials
                </a>
<div class="h-px w-12 bg-white/10"></div>
<div class="flex items-center gap-3">
<span class="relative flex h-1.5 w-1.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-40"></span>
<span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-white"></span>
</span>
<span class="text-[9px] font-bold uppercase tracking-technical text-white/40">
                        Security Status: Encrypted
                    </span>
</div>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white/5 to-transparent"></div>

</body></html>
